name: Reusable - Nightly Link Checker

# Scans all markdown files in the repo for broken links. Runs nightly
# instead of per-PR to reduce CI cost. Creates a GitHub issue for each
# broken link that doesn't already have an open issue.
#
# Usage from a caller workflow:
#
#   name: Nightly Link Check
#   on:
#     schedule:
#       - cron: "0 5 * * 1"   # weekly Monday 05:00 UTC
#     workflow_dispatch:
#   jobs:
#     links:
#       uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-link-checker.yml@main
#       permissions:
#         issues: write
#         contents: read

on:
  workflow_call:
    inputs:
      # Glob pattern for files to scan (default: all markdown)
      file_pattern:
        description: 'Glob pattern for files to check'
        required: false
        type: string
        default: '**/*.md'
      # Extra lychee args (e.g., --exclude-path vendor/)
      extra_args:
        description: 'Extra arguments passed to lychee'
        required: false
        type: string
        default: ''
      # Label for issues created by this workflow
      issue_label:
        description: 'Label to apply to created issues'
        required: false
        type: string
        default: 'broken-link'

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create issue label if missing
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.issue_label }}
        run: |
          gh label create "$LABEL" --color "d73a4a" --description "Broken link detected by nightly scan" 2>/dev/null || true

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@f81112d0d2814ded911bd23e3beaa9dda9f8ca55 # v2.3.0
        with:
          args: >-
            --no-progress
            --format json
            --output /tmp/lychee-results.json
            --exclude-mail
            --max-retries 2
            --timeout 30
            --accept 100..=399
            --exclude 'linkedin\.com'
            --exclude 'docs\.google\.com'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'localtest\.me'
            --exclude '\.svc\.cluster\.local'
            ${{ inputs.extra_args }}
            '${{ inputs.file_pattern }}'
          fail: false

      - name: Parse results and create issues
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.issue_label }}
        run: |
          set -euo pipefail

          RESULTS="/tmp/lychee-results.json"
          if [ ! -f "$RESULTS" ]; then
            echo "No results file — lychee may have failed to run"
            exit 0
          fi

          # Extract failed links as "file|url|status" lines
          jq -r '
            .fail // {} | to_entries[] |
            .key as $file |
            .value[] |
            "\($file)|\(.url)|\(.status.code // .status.text // "unknown")"
          ' "$RESULTS" > /tmp/broken-links.txt 2>/dev/null || true

          BROKEN_COUNT=$(wc -l < /tmp/broken-links.txt | tr -d ' ')
          echo "Found $BROKEN_COUNT broken links"

          if [ "$BROKEN_COUNT" -eq 0 ]; then
            echo "All links OK"
            exit 0
          fi

          # Get existing open issues with our label
          gh issue list --state open --label "$LABEL" --json title,number \
            --jq '.[].title' > /tmp/existing-issues.txt 2>/dev/null || true

          CREATED=0
          SKIPPED=0

          while IFS='|' read -r file url status; do
            [ -z "$url" ] && continue

            # Deduplicate: check if an issue already exists for this URL
            SEARCH_URL=$(echo "$url" | sed 's|https\?://||' | cut -c1-80)
            if grep -qF "$SEARCH_URL" /tmp/existing-issues.txt 2>/dev/null; then
              echo "  SKIP (issue exists): $url"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # Create issue
            TITLE="Broken link: ${SEARCH_URL}"
            # Truncate title to 256 chars (GitHub limit)
            TITLE="${TITLE:0:256}"

            BODY="## Broken Link Detected

**URL**: $url
**Status**: $status
**Found in**: \`$file\`
**Detected by**: Nightly link checker ([workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}))

### Action Required

- [ ] Fix or remove the broken link in \`$file\`

---
*This issue was automatically created by the nightly link checker. If this is a false positive, close the issue and add the URL to the lychee exclude list.*"

            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "$LABEL" || echo "  Failed to create issue for $url"

            CREATED=$((CREATED + 1))

            # Rate limit: don't create more than 10 issues per run
            if [ "$CREATED" -ge 10 ]; then
              echo "::warning::Rate limit: created 10 issues, skipping remaining"
              break
            fi
          done < /tmp/broken-links.txt

          echo ""
          echo "## Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Broken links found: $BROKEN_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Issues created: $CREATED" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped (issue exists): $SKIPPED" >> $GITHUB_STEP_SUMMARY
