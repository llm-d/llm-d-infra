name: Reusable - Nightly Typo Checker

# Scans the entire repo for typos using crate-ci/typos. Runs nightly
# instead of per-PR to reduce CI cost. Creates a single GitHub issue
# per run listing all new typos found, if one doesn't already exist.
#
# Repos should have a `_typos.toml` config for domain-specific terms.
# See templates/repo-template/_typos.toml for the base config.
#
# Usage from a caller workflow:
#
#   name: Nightly Typo Check
#   on:
#     schedule:
#       - cron: "0 5 * * 1"   # weekly Monday 05:00 UTC
#     workflow_dispatch:
#   jobs:
#     typos:
#       uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-typo-checker.yml@main
#       permissions:
#         issues: write
#         contents: read

on:
  workflow_call:
    inputs:
      # Extra args for typos CLI (e.g., --exclude vendor/)
      extra_args:
        description: 'Extra arguments passed to typos CLI'
        required: false
        type: string
        default: ''
      # Label for issues created by this workflow
      issue_label:
        description: 'Label to apply to created issues'
        required: false
        type: string
        default: 'typo'
      # Config file path (default: _typos.toml in repo root)
      config_file:
        description: 'Path to typos config file'
        required: false
        type: string
        default: '_typos.toml'

jobs:
  check-typos:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create issue label if missing
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.issue_label }}
        run: |
          gh label create "$LABEL" --color "fbca04" --description "Typo detected by nightly scan" 2>/dev/null || true

      - name: Install typos
        run: |
          TYPOS_VERSION="v1.31.1"
          curl -fsSL "https://github.com/crate-ci/typos/releases/download/${TYPOS_VERSION}/typos-${TYPOS_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz -C /usr/local/bin typos

      - name: Ensure config exists
        run: |
          if [ ! -f "${{ inputs.config_file }}" ]; then
            echo "::warning::No ${{ inputs.config_file }} found — using defaults. Consider adding a config file for domain terms."
            # Create minimal config so typos doesn't fail
            cat > /tmp/typos-fallback.toml << 'TOML'
          [default.extend-words]
          AKS = "AKS"
          aks = "aks"
          IST = "IST"
          ND = "ND"

          [files]
          extend-exclude = [
            "*.lock",
            "*.lock.yml",
            "vendor/",
            "node_modules/",
            "*.pb.go",
            "_generated*",
          ]
          TOML
            echo "TYPOS_CONFIG=/tmp/typos-fallback.toml" >> $GITHUB_ENV
          else
            echo "TYPOS_CONFIG=${{ inputs.config_file }}" >> $GITHUB_ENV
          fi

      - name: Run typos
        id: typos
        run: |
          set -o pipefail

          # Run typos with JSON output, capture exit code
          typos --config "$TYPOS_CONFIG" \
            --format json \
            ${{ inputs.extra_args }} \
            . > /tmp/typos-raw.json 2>/dev/null || true

          # Count typos found
          TYPO_COUNT=$(wc -l < /tmp/typos-raw.json | tr -d ' ')
          echo "typo_count=$TYPO_COUNT" >> $GITHUB_OUTPUT
          echo "Found $TYPO_COUNT typos"

      - name: Parse and deduplicate
        if: steps.typos.outputs.typo_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ inputs.issue_label }}
        run: |
          set -euo pipefail

          # Parse typos JSON (one JSON object per line) into a readable table
          # Format: file:line:col: `typo` -> `correction`
          jq -r '
            select(.type == "typo") |
            "\(.path):\(.line_num):\(.byte_offset): `\(.typo)` -> `\(.corrections[0] // "?")`"
          ' /tmp/typos-raw.json | sort -u > /tmp/typos-deduped.txt

          UNIQUE_COUNT=$(wc -l < /tmp/typos-deduped.txt | tr -d ' ')
          echo "Unique typos: $UNIQUE_COUNT"

          if [ "$UNIQUE_COUNT" -eq 0 ]; then
            echo "No actionable typos after dedup"
            exit 0
          fi

          # Check if an open typo issue already covers these
          EXISTING=$(gh issue list --state open --label "$LABEL" --json number,title \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "Open typo issue already exists: #$EXISTING"

            # Append any NEW typos as a comment instead of creating a duplicate
            # Get existing issue body to compare
            EXISTING_BODY=$(gh issue view "$EXISTING" --json body --jq '.body' 2>/dev/null || true)

            NEW_TYPOS=""
            while IFS= read -r line; do
              TYPO_WORD=$(echo "$line" | grep -oP '`\K[^`]+' | head -1)
              if ! echo "$EXISTING_BODY" | grep -qF "$TYPO_WORD" 2>/dev/null; then
                NEW_TYPOS="${NEW_TYPOS}${line}\n"
              fi
            done < /tmp/typos-deduped.txt

            if [ -n "$NEW_TYPOS" ]; then
              COMMENT="## New typos found ($(date -u +%Y-%m-%d))

\`\`\`
$(echo -e "$NEW_TYPOS")
\`\`\`

Detected by [nightly typo checker](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

              gh issue comment "$EXISTING" --body "$COMMENT"
              echo "Added new typos as comment on #$EXISTING"
            else
              echo "No new typos — all already reported in #$EXISTING"
            fi
            exit 0
          fi

          # Build a table for the issue body (limit to 50 to keep issue readable)
          TABLE_LINES=$(head -50 /tmp/typos-deduped.txt)
          REMAINING=$((UNIQUE_COUNT - 50))

          BODY="## Typos Detected

The nightly typo checker found **$UNIQUE_COUNT** typos in this repository.

### Typos

\`\`\`
$TABLE_LINES
\`\`\`"

          if [ "$REMAINING" -gt 0 ]; then
            BODY="$BODY

*... and $REMAINING more. Run \`typos\` locally to see all.*"
          fi

          BODY="$BODY

### How to Fix

\`\`\`bash
# Install typos
cargo install typos-cli
# Or: brew install typos-cli

# See all typos
typos .

# Auto-fix (review changes before committing)
typos --write-changes .
\`\`\`

### False Positives

Add domain-specific terms to \`_typos.toml\`:
\`\`\`toml
[default.extend-words]
myterm = \"myterm\"
\`\`\`

---
*Detected by [nightly typo checker](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). This issue will be updated with new typos on subsequent runs.*"

          gh issue create \
            --title "Typos detected by nightly scan ($UNIQUE_COUNT found)" \
            --body "$BODY" \
            --label "$LABEL"

          echo "## Typo Check" >> $GITHUB_STEP_SUMMARY
          echo "- Typos found: $UNIQUE_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Issue created: yes" >> $GITHUB_STEP_SUMMARY
